<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCSR Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #080909;
    --bg2:    #0d0e0f;
    --bg3:    #111213;
    --border: #1e2022;
    --text:   #d4d8dd;
    --muted:  #525861;
    --accent: #4ade80;
    --red:    #f87171;
    --amber:  #fbbf24;
  }

  body {
    background: transparent;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text);
    padding: 0;
    margin: 0;
    min-width: 300px;
  }

  #overlay {
    background: rgba(8,9,9,0.88);
    border: 1px solid var(--border);
    border-radius: 0;
    display: none;
    overflow: hidden;
  }

  #overlay.loaded { display: block; }

  /* ── Header strip ── */
  .ov-header {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .ov-avatar {
    width: 24px; height: 24px;
    image-rendering: pixelated;
  }

  /* ── Stats grid ── */
  .ov-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .ov-stat {
    padding: 8px 12px;
    border-right: 1px solid var(--border);
  }
  .ov-stat:last-child { border-right: none; }

  .ov-stat-label {
    font-size: 8px;
    color: var(--muted);
    letter-spacing: .07em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .ov-stat-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .ov-stat-value.accent { color: var(--accent); }

  /* ── Qual row ── */
  .ov-qual {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .ov-qual-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .ov-qual-value {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    text-align: right;
  }

  .ov-qual-value.warn { color: var(--amber); }
  .ov-qual-value.bad  { color: var(--red); }

  /* ── Footer ── */
  .ov-footer {
    padding: 5px 12px;
    background: var(--bg2);
  }

  .ov-countdown {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: .04em;
  }

  .error {
    padding: 12px;
    font-size: 11px;
    color: var(--red);
  }
</style>
</head>
<body>
<div id="overlay">
  <div id="content"></div>
</div>

<script>
const params      = new URLSearchParams(location.search);
const playerParam = (params.get('player') ?? '').toLowerCase();
const PHASE_END   = 1777507200;

const PP_TABLE = [
  [1,100],[2,94],[3,89],[4,84],[5,79],[6,75],[7,71],[8,67],[9,64],[10,60],
  [11,57],[12,54],[13,52],[14,49],[15,47],[16,44],[17,42],[18,40],[19,38],[20,36],
  [25,29],[30,23],[40,16],[50,11],[60,9],[70,8],[80,8],[100,4],
];
const p4Pts = r => {
  for (let i = PP_TABLE.length - 1; i >= 0; i--) {
    if (r >= PP_TABLE[i][0]) return PP_TABLE[i][1];
  }
  return 4;
};

const eloCol = r => r >= 2000 ? '#a78bfa' : r >= 1500 ? '#7dd3fc' : r >= 1200 ? '#86efac' : r >= 900 ? '#fde047' : r >= 600 ? '#d1d5db' : '#6b7280';

const fmtCountdown = t => {
  const d = t - Math.floor(Date.now() / 1000);
  if (d <= 0) return 'Season ended';
  const days = Math.floor(d / 86400);
  const hrs  = Math.floor((d % 86400) / 3600);
  const mins = Math.floor((d % 3600) / 60);
  if (days > 0) return `Season end: ${days}d ${hrs}h ${mins}m`;
  if (hrs > 0)  return `Season end: ${hrs}h ${mins}m`;
  return `Season end: ${mins}m`;
};

async function load() {
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('content');

  if (!playerParam) {
    overlay.classList.add('loaded');
    content.innerHTML = `<div class="error">Add ?player=YourUsername to the URL</div>`;
    return;
  }

  try {
    const [phaseRes, eloRes] = await Promise.all([
      fetch('https://api.mcsrranked.com/phase-leaderboard?predicted=true'),
      fetch('https://api.mcsrranked.com/leaderboard'),
    ]);
    const phaseJson = await phaseRes.json();
    const eloJson   = await eloRes.json();

    const rawPhase = phaseJson.data?.users ?? [];
    const rawElo   = eloJson.data?.users   ?? [];

    const phasePlayer = rawPhase.find(u => u.nickname?.toLowerCase() === playerParam || u.uuid === playerParam);
    const eloPlayer   = rawElo.find(u => u.nickname?.toLowerCase() === playerParam || u.uuid === playerParam);

    if (!phasePlayer && !eloPlayer) {
      overlay.classList.add('loaded');
      content.innerHTML = `<div class="error">Player "${playerParam}" not found</div>`;
      return;
    }

    const uuid      = (phasePlayer ?? eloPlayer).uuid;
    const nickname  = (phasePlayer ?? eloPlayer).nickname;
    const eloRate   = eloPlayer?.eloRate ?? phasePlayer?.eloRate ?? 0;
    const eloRk     = eloPlayer?.eloRank ?? phasePlayer?.eloRank ?? 0;
    const currentPP = phasePlayer?.seasonResult?.phasePoint ?? 0;
    const predPP    = phasePlayer?.predPhasePoint ?? currentPP;
    const gain      = predPP - currentPP;

    const sorted = [...rawPhase].sort((a, b) =>
      b.predPhasePoint - a.predPhasePoint || a.eloRank - b.eloRank
    );
    const ppRk  = sorted.findIndex(u => u.uuid === uuid) + 1 || '—';
    const lcqPP = sorted.length >= 100 ? sorted[99].predPhasePoint : null;

    // eloByRank for qual gap
    const eloByRank = {};
    [...rawElo].sort((a,b) => (b.eloRate??0) - (a.eloRate??0)).forEach((u,i) => { eloByRank[i+1] = u.eloRate ?? 0; });

    // Build qual string
    let qualText, qualClass;
    if (ppRk !== '—' && ppRk <= 12) {
      if (ppRk === 1) {
        qualText = '↑ seed #1 — top seed';
        qualClass = '';
      } else {
        // How much elo to beat the player above?
        const boundary = sorted[ppRk - 2]; // player ranked one above
        const bPP    = boundary?.seasonResult?.phasePoint ?? 0;
        const bEloRk = rawElo.find(u => u.uuid === boundary?.uuid)?.eloRank ?? (ppRk - 1);
        let gap = null;
        for (let r = eloRk; r >= 1; r--) {
          const myNew = currentPP + p4Pts(r);
          const bNew  = bPP + p4Pts(bEloRk);
          if (myNew > bNew || (myNew === bNew && (eloByRank[r] ?? 0) > (eloByRank[bEloRk] ?? 0))) {
            gap = Math.max(0, (eloByRank[r] ?? 0) - eloRate);
            break;
          }
        }
        qualText  = gap === null ? `↑ seed #${ppRk} — unreachable` : gap === 0 ? `↑ seed #${ppRk} — qualified` : `↑ seed #${ppRk} — +${gap} elo`;
        qualClass = gap === null ? 'bad' : gap === 0 ? '' : 'warn';
      }
    } else if (lcqPP !== null && predPP >= lcqPP) {
      const boundary = sorted[11];
      const bPP    = boundary?.seasonResult?.phasePoint ?? 0;
      const bEloRk = rawElo.find(u => u.uuid === boundary?.uuid)?.eloRank ?? 12;
      let gap = null;
      for (let r = eloRk; r >= 1; r--) {
        const myNew = currentPP + p4Pts(r);
        const bNew  = bPP + p4Pts(bEloRk);
        if (myNew > bNew || (myNew === bNew && (eloByRank[r] ?? 0) > (eloByRank[bEloRk] ?? 0))) {
          gap = Math.max(0, (eloByRank[r] ?? 0) - eloRate);
          break;
        }
      }
      qualText  = gap === null ? '→ Playoffs: unreachable' : gap === 0 ? '→ Playoffs: qualified' : `→ Playoffs: +${gap} elo`;
      qualClass = gap === null ? 'bad' : gap === 0 ? '' : 'warn';
    } else {
      qualText  = lcqPP ? `→ LCQ: needs ${lcqPP - predPP} more pts` : '→ LCQ: outside top 100';
      qualClass = 'bad';
    }

    const avatarSrc = `https://minotar.net/helm/${uuid.replace(/-/g,'')}/24`;

    content.innerHTML = `
      <div class="ov-header">
        <img class="ov-avatar" src="${avatarSrc}" onerror="this.style.display='none'">
      </div>
      <div class="ov-stats">
        <div class="ov-stat">
          <div class="ov-stat-label">pred pts</div>
          <div class="ov-stat-value accent">${predPP}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-label">pp rank</div>
          <div class="ov-stat-value">#${ppRk}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-label">elo</div>
          <div class="ov-stat-value" style="color:${eloCol(eloRate)}">${eloRate}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-label">elo rank</div>
          <div class="ov-stat-value">#${eloRk}</div>
        </div>
      </div>
      <div class="ov-qual">
        <span class="ov-qual-label">to qualify</span>
        <span class="ov-qual-value ${qualClass}">${qualText}</span>
      </div>
      <div class="ov-footer">
        <span class="ov-countdown" id="ov-countdown">${fmtCountdown(PHASE_END)}</span>
      </div>
    `;

    overlay.classList.add('loaded');
  } catch(e) {
    document.getElementById('overlay').classList.add('loaded');
    document.getElementById('content').innerHTML = `<div class="error">Failed to load data</div>`;
  }
}

load();
setInterval(load, 60000);
setInterval(() => {
  const el = document.getElementById('ov-countdown');
  if (el) el.textContent = fmtCountdown(PHASE_END);
}, 1000);
</script>
</body>
</html>
