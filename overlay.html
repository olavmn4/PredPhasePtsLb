  .qual-lcq  { background: rgba(251,191,36,.06);  border: 1px solid rgba(251,191,36,.2);  color: #fbbf24; }
  .qual-po   { background: rgba(96,165,250,.06);  border: 1px solid rgba(96,165,250,.2);  color: #60a5fa; }
  .qual-seed { background: rgba(74,222,128,.05);  border: 1px solid rgba(74,222,128,.15); color: rgba(74,222,128,.75); }

  .error { padding: 12px; font-size: 11px; color: var(--red); }

const params      = new URLSearchParams(location.search);
const playerParam = (params.get('player') ?? '').toLowerCase();
const PHASE_END   = 1777507200;
const HIDDEN      = new Set(['KenanKardes','LoveWalter','nyachloe','Hinart']);

const PP_TABLE = [
  [1,50,60,75,100],[2,47,57,71,94],[3,45,53,67,89],[4,42,50,63,84],
  [5,40,48,60,79],[6,38,45,56,75],[7,36,43,53,71],[8,34,40,50,67],
  [9,32,38,48,64],[10,30,36,45,60],[11,29,34,43,57],[12,27,33,41,54],
  [13,26,31,39,52],[14,25,29,37,49],[15,23,28,35,47],[16,22,27,33,44],
  [17,21,25,32,42],[18,20,24,30,40],[19,19,23,29,38],[20,18,22,27,36],
  [21,17,21,26,35],[22,17,20,25,33],[23,16,19,24,32],[24,15,18,23,30],
  [25,14,17,22,29],[26,14,17,21,28],[27,13,16,20,26],[28,13,15,19,25],
  [29,12,15,18,24],[30,12,14,17,23],[31,11,13,17,22],[32,11,13,16,21],
  [33,10,12,15,21],[34,10,12,15,20],[35,9,11,14,19],[36,9,11,14,18],
  [37,9,11,13,18],[38,8,10,13,17],[39,8,10,12,16],[40,8,9,12,16],
  [41,8,9,11,15],[42,7,9,11,15],[43,7,8,11,14],[44,7,8,10,14],
  [45,7,8,10,13],[46,6,8,10,13],[47,6,7,9,12],[48,6,7,9,12],
  [49,6,7,9,12],[50,6,7,8,11],[51,5,7,8,11],[52,5,6,8,11],
  [53,5,6,8,10],[54,5,6,8,10],[55,5,6,7,10],[56,5,6,7,9],
  [57,5,6,7,9],[58,4,5,7,9],[59,4,5,7,9],[60,4,5,6,9],
  [61,4,5,6,8],[62,4,5,6,8],[63,4,5,6,8],[64,4,5,6,8],
  [65,4,5,6,8],[66,4,4,6,7],[67,4,4,5,7],[68,4,4,5,7],
  [69,4,4,5,7],[70,3,4,5,7],[71,3,4,5,7],[72,3,4,5,7],
  [73,3,4,5,6],[74,3,4,4,6],[75,3,4,4,6],[76,3,3,4,6],
  [77,3,3,4,5],[78,3,3,4,5],[79,3,3,4,5],[80,3,3,4,5],
  [81,3,3,3,5],[82,3,3,3,4],[83,2,3,3,4],[84,2,3,3,4],
  [85,2,3,3,4],[86,2,2,3,4],[87,2,2,3,4],[88,2,2,3,4],
  [89,2,2,3,4],[90,2,2,3,4],[91,2,2,3,3],[92,2,2,2,3],
  [93,2,2,2,3],[94,2,2,2,3],[95,2,2,2,3],[96,2,2,2,3],
  [97,3,3,4,5],[98,3,3,4,5],[99,3,3,4,5],[100,3,3,4,4]
];
// P4 is column index 4 (0-based: rank, p1, p2, p3, p4)
const curPts = r => (r >= 1 && r <= 100) ? PP_TABLE[r-1][4] : 0;

const eloCol = r => r >= 2000 ? '#a78bfa' : r >= 1500 ? '#7dd3fc' : r >= 1200 ? '#86efac' : r >= 900 ? '#fde047' : r >= 600 ? '#d1d5db' : '#6b7280';

const fmtCountdown = t => {
  const d = t - Math.floor(Date.now() / 1000);
  if (d <= 0) return 'Season ended';
  const days = Math.floor(d / 86400);
  const hrs  = Math.floor((d % 86400) / 3600);
  const mins = Math.floor((d % 3600) / 60);
  if (days > 0) return `Season end: ${days}d ${hrs}h ${mins}m`;
  if (hrs > 0)  return `Season end: ${hrs}h ${mins}m`;
  return `Season end: ${mins}m`;
};

async function load() {
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('content');

  if (!playerParam) {
    overlay.classList.add('loaded');
    content.innerHTML = `<div class="error">Add ?player=YourUsername to the URL</div>`;
    return;
  }

  try {
    const [phaseRes, eloRes] = await Promise.all([
      fetch('https://api.mcsrranked.com/phase-leaderboard?predicted=true'),
      fetch('https://api.mcsrranked.com/leaderboard'),
    ]);
    const rawPhaseAll = (await phaseRes.json()).data?.users ?? [];
    const rawEloAll   = (await eloRes.json()).data?.users   ?? [];

    // Filter hidden/banned players — same as website
    const rawPhase = rawPhaseAll.filter(u => !HIDDEN.has(u.nickname));
    const visibleElo = rawEloAll.filter(u => !HIDDEN.has(u.nickname));

    // eloMap: API ranks for display
    const eloMap = {};
    for (const u of rawEloAll) eloMap[u.uuid] = { eloRate: u.eloRate, eloRank: u.eloRank };

    // correctedRankMap: visible-only ranks for simulateQual
    const eloSortedVisible = [...visibleElo].sort((a,b) => (b.eloRate??0)-(a.eloRate??0));
    const correctedRankMap = {};
    eloSortedVisible.forEach((u, i) => { correctedRankMap[u.uuid] = i + 1; });

    // eloByRank from visible players
    const eloByRank = {};
    eloSortedVisible.forEach((u, i) => { eloByRank[i+1] = u.eloRate ?? 0; });

    // Sort phase leaderboard
    const sorted = [...rawPhase].sort((a,b) =>
      b.predPhasePoint - a.predPhasePoint || a.eloRank - b.eloRank
    );
    const lcqPP = sorted.length >= 100 ? sorted[99].predPhasePoint : null;

    // Find player
    const phasePlayer = sorted.find(u => u.nickname?.toLowerCase() === playerParam || u.uuid === playerParam);
    const eloPlayer   = rawEloAll.find(u => u.nickname?.toLowerCase() === playerParam || u.uuid === playerParam);

    if (!phasePlayer && !eloPlayer) {
      overlay.classList.add('loaded');
      content.innerHTML = `<div class="error">Player "${playerParam}" not found</div>`;
      return;
    }

    const p        = phasePlayer ?? eloPlayer;
    const uuid     = p.uuid;
    const eloRate  = eloMap[uuid]?.eloRate ?? 0;
    const eloRk    = eloMap[uuid]?.eloRank ?? 0;
    const simEloRk = correctedRankMap[uuid] ?? eloRk;
    const currentPP = phasePlayer?.seasonResult?.phasePoint ?? 0;
    const predPP    = phasePlayer?.predPhasePoint ?? currentPP;
    const ppRk      = phasePlayer ? sorted.findIndex(u => u.uuid === uuid) + 1 : null;

    // simulateQual — exact same logic as website
    function simulateQual(targetPosition) {
      const boundary = sorted[targetPosition - 1];
      if (!boundary) return { gap: null, rank: null };
      const bCurrentPP = boundary.seasonResult?.phasePoint ?? 0;
      const bEloRk = correctedRankMap[boundary.uuid] ?? eloMap[boundary.uuid]?.eloRank ?? targetPosition;

      for (let r = simEloRk; r >= 1; r--) {
        const myNew = currentPP + curPts(r);
        let bNewEloRk = bEloRk;
        if (bEloRk >= r && bEloRk < simEloRk) bNewEloRk = bEloRk + 1;
        const bNew = bCurrentPP + curPts(bNewEloRk);

        if (myNew > bNew) {
          const targetElo = eloByRank[r] ?? 0;
          return { gap: Math.max(0, targetElo - eloRate), rank: r };
        }
        if (myNew === bNew) {
          const bNewElo   = eloByRank[bNewEloRk] ?? 0;
          const targetElo = eloByRank[r] ?? 0;
          if (targetElo > bNewElo) {
            if (targetElo > eloRate) return { gap: targetElo - eloRate, rank: r };
            else { const aboveElo = eloByRank[r-1] ?? targetElo+1; return { gap: aboveElo - eloRate, rank: r-1 }; }
          }
        }
      }
      return { gap: null, rank: null };
    }

    // Build qual pill — same style as website
    let qualHtml;
    if (!ppRk) {
      qualHtml = `<span class="qual-pill qual-lcq">→ LCQ <span style="opacity:.55">0 pred pts</span></span>`;
    } else if (ppRk === 1) {
      qualHtml = `<span class="qual-pill qual-seed">↑ seed <span style="opacity:.7">top seed</span></span>`;
    } else if (ppRk <= 12) {
      const { gap, rank } = simulateQual(ppRk - 1);
      const rankStr = rank != null ? ` <span style="opacity:.5">(rank ${rank})</span>` : '';
      if (gap === null)   qualHtml = `<span class="qual-pill qual-seed">↑ seed <span style="opacity:.55">currently unreachable</span></span>`;
      else                qualHtml = `<span class="qual-pill qual-seed">↑ seed +${gap} elo${rankStr}</span>`;
    } else if (lcqPP !== null && predPP >= lcqPP) {
      const { gap, rank } = simulateQual(12);
      const rankStr = rank != null ? ` <span style="opacity:.5">(rank ${rank})</span>` : '';
      if (gap === null)   qualHtml = `<span class="qual-pill qual-po">→ Playoffs <span style="opacity:.55">currently unreachable</span></span>`;
      else                qualHtml = `<span class="qual-pill qual-po">→ Playoffs +${gap} elo${rankStr}</span>`;
    } else {
      const { gap, rank } = simulateQual(100);
      const rankStr = rank != null ? ` <span style="opacity:.5">(rank ${rank})</span>` : '';
      if (gap === null)   qualHtml = `<span class="qual-pill qual-lcq">→ LCQ <span style="opacity:.55">currently unreachable</span></span>`;
      else                qualHtml = `<span class="qual-pill qual-lcq">→ LCQ +${gap} elo${rankStr}</span>`;
    }

    const avatarSrc = `https://minotar.net/helm/${uuid.replace(/-/g,'')}/24`;

    content.innerHTML = `
      <div class="ov-header">
        <img class="ov-avatar" src="${avatarSrc}" onerror="this.style.display='none'">
        <span class="ov-countdown" id="ov-countdown">${fmtCountdown(PHASE_END)}</span>
      </div>
      <div class="ov-stats">
        <div class="ov-stat">
          <div class="ov-stat-label">pred pts</div>
          <div class="ov-stat-value accent">${predPP}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-label">elo</div>
          <div class="ov-stat-value" style="color:${eloCol(eloRate)}">${eloRate}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-label">elo rank</div>
          <div class="ov-stat-value">#${eloRk}</div>
        </div>
      </div>
      <div class="ov-qual">
        <span class="ov-qual-label">to qualify</span>
        ${qualHtml}
      </div>
    `;

    overlay.classList.add('loaded');
  } catch(e) {
    document.getElementById('overlay').classList.add('loaded');
    document.getElementById('content').innerHTML = `<div class="error">Failed to load</div>`;
  }
}

load();
setInterval(load, 60000);
setInterval(() => {
  const el = document.getElementById('ov-countdown');
  if (el) el.textContent = fmtCountdown(PHASE_END);
}, 1000);
</script>
</body>

    const currentPP = phasePlayer?.seasonResult?.phasePoint ?? 0;
    const predPP    = phasePlayer?.predPhasePoint ?? currentPP;
    const ppRk      = phasePlayer ? sorted.findIndex(u => u.uuid === uuid) + 1 : null;

    // simulateQual — exact same logic as website
    function simulateQual(targetPosition) {
      const boundary = sorted[targetPosition - 1];
      if (!boundary) return { gap: null, rank: null };
      const bCurrentPP = boundary.seasonResult?.phasePoint ?? 0;
      const bEloRk = correctedRankMap[boundary.uuid] ?? eloMap[boundary.uuid]?.eloRank ?? targetPosition;

      for (let r = simEloRk; r >= 1; r--) {
        const myNew = currentPP + curPts(r);
        let bNewEloRk = bEloRk;
        if (bEloRk >= r && bEloRk < simEloRk) bNewEloRk = bEloRk + 1;
        const bNew = bCurrentPP + curPts(bNewEloRk);

        if (myNew > bNew) {
          const targetElo = eloByRank[r] ?? 0;
          return { gap: Math.max(0, targetElo - eloRate), rank: r };
        }
        if (myNew === bNew) {
          const bNewElo   = eloByRank[bNewEloRk] ?? 0;
          const targetElo = eloByRank[r] ?? 0;
          if (targetElo > bNewElo) {
            if (targetElo > eloRate) return { gap: targetElo - eloRate, rank: r };
            else { const aboveElo = eloByRank[r-1] ?? targetElo+1; return { gap: aboveElo - eloRate, rank: r-1 }; }
          }
        }
      }
      return { gap: null, rank: null };
    }

    // Build qual pill — same style as website
    let qualHtml;
    if (!ppRk) {
      qualHtml = `<span class="qual-pill qual-lcq">→ LCQ <span style="opacity:.55">0 pred pts</span></span>`;
    } else if (ppRk === 1) {
      qualHtml = `<span class="qual-pill qual-seed">↑ seed <span style="opacity:.7">top seed</span></span>`;
    } else if (ppRk <= 12) {
      const { gap, rank } = simulateQual(ppRk - 1);
      const rankStr = rank != null ? ` <span style="opacity:.5">(rank ${rank})</span>` : '';
      if (gap === null)   qualHtml = `<span class="qual-pill qual-seed">↑ seed <span style="opacity:.55">currently unreachable</span></span>`;
      else                qualHtml = `<span class="qual-pill qual-seed">↑ seed +${gap} elo${rankStr}</span>`;
    } else if (lcqPP !== null && predPP >= lcqPP) {
      const { gap, rank } = simulateQual(12);
      const rankStr = rank != null ? ` <span style="opacity:.5">(rank ${rank})</span>` : '';
      if (gap === null)   qualHtml = `<span class="qual-pill qual-po">→ Playoffs <span style="opacity:.55">currently unreachable</span></span>`;
      else                qualHtml = `<span class="qual-pill qual-po">→ Playoffs +${gap} elo${rankStr}</span>`;
    } else {
      const { gap, rank } = simulateQual(100);
      const rankStr = rank != null ? ` <span style="opacity:.5">(rank ${rank})</span>` : '';
      if (gap === null)   qualHtml = `<span class="qual-pill qual-lcq">→ LCQ <span style="opacity:.55">currently unreachable</span></span>`;
      else                qualHtml = `<span class="qual-pill qual-lcq">→ LCQ +${gap} elo${rankStr}</span>`;
    }

    const avatarSrc = `https://minotar.net/helm/${uuid.replace(/-/g,'')}/24`;

    content.innerHTML = `
      <div class="ov-header">
        <img class="ov-avatar" src="${avatarSrc}" onerror="this.style.display='none'">
      </div>
      <div class="ov-stats">
        <div class="ov-stat">
          <div class="ov-stat-label">pred pts</div>
          <div class="ov-stat-value accent">${predPP}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-label">pp rank</div>
          <div class="ov-stat-value">${ppRk ? '#'+ppRk : '—'}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-label">elo</div>
          <div class="ov-stat-value" style="color:${eloCol(eloRate)}">${eloRate}</div>
        </div>
        <div class="ov-stat">
          <div class="ov-stat-label">elo rank</div>
          <div class="ov-stat-value">#${eloRk}</div>
        </div>
      </div>
      <div class="ov-qual">
        <span class="ov-qual-label">to qualify</span>
        ${qualHtml}
      </div>
      <div class="ov-footer">
        <span class="ov-countdown" id="ov-countdown">${fmtCountdown(PHASE_END)}</span>
      </div>
    `;

    overlay.classList.add('loaded');
  } catch(e) {
    document.getElementById('overlay').classList.add('loaded');
    document.getElementById('content').innerHTML = `<div class="error">Failed to load</div>`;
  }
}

load();
setInterval(load, 60000);
setInterval(() => {
  const el = document.getElementById('ov-countdown');
  if (el) el.textContent = fmtCountdown(PHASE_END);
}, 1000);
</script>
</body>
</html>
